name: DevOps Task Manager CI/CD

# Control triggers: execute on pushes or pull requests to the primary branches,
# and support manual triggering through workflow_dispatch.
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-test-deploy:
    name: Build, Test, and Publish Docker Image
    runs-on: ubuntu-latest

    steps:
      # =========================================================================
      # 1. CODE CHECKOUT & RUNTIME CONFIGURATION
      # =========================================================================
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Fetch only the latest commit to optimize checkout speeds

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # Automates caching of the node_modules cache folder to speed up runs

      # =========================================================================
      # 2. RUNTIME TESTING & SANITY CHECK
      # =========================================================================
      - name: Install Production & Dev Dependencies
        # npm ci guarantees a clean, deterministic install of dependencies matching lockfile exactly
        run: npm ci

      - name: Run Test Suite
        run: npm test

      # =========================================================================
      # 3. DOCKER BUILDX & REGISTRY LOGINS
      # =========================================================================
      - name: Set up QEMU (Multi-platform support)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          install: true

      - name: Log in to Docker Hub
        # Only log in and push when merging to the main/master branches, not on general PRs
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # =========================================================================
      # 4. CONTAINER BUILD, CACHE, AND DEPLOYMENT (DOCKERHUB PUSH)
      # =========================================================================
      - name: Extract Metadata (Tags, Labels) for Docker
        if: github.event_name != 'pull_request'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/devops-task-manager
          tags: |
            type=raw,value=latest,enable=true
            type=sha,format=short,prefix=,enable=true

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          # Push only on merges to main/master branches (not on pull requests)
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Leverages GitHub Actions cache backend to speed up Docker layer builds
          cache-from: type=gha
          cache-to: type=gha,mode=max